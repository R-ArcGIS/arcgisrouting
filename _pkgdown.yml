url: http://r.esri.com/arcgisrouting/

repo:
  url:
    home: https://github.com/r-arcgis/arcgisrouting/
    source: https://github.com/r-arcgis/arcgisrouting/blob/HEAD/
    issue: https://github.com/r-arcgis/arcgisrouting/issues/
    user: https://github.com/

development:
  mode: auto

template:
  bootstrap: 5
  light-switch: true
  bslib:
    # Esri brand palette
    primary: "#0079C1" # Esri blue
    secondary: "#004874" # Esri navy
    success: "#35AC46" # Esri green
    info: "#00B6F1" # Esri light blue
    warning: "#FFB100" # Esri amber
    danger: "#E4002B" # Esri red
    base_font: { google: "Inter" }
    heading_font: { google: "Inter" }
    code_font: { google: "Source Code Pro" }
    navbar-bg: "#004874"
    bslib_spacer: "1rem"
    border-radius: "0.5rem"
  includes:
    in_header: |
      <meta name="theme-color" content="#004874">

navbar:
  bg: secondary
  type: dark
  structure:
    left: [reference]
    right: [search, github, lightswitch]
  components:
    reference:
      text: Reference
      href: reference/index.html
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/r-arcgis/arcgisrouting
      aria-label: View source on GitHub

footer:
  structure:
    left: [package, developed_with]
    right: [esri, built_with]
  components:
    esri:
      text: Part of the [R-ArcGIS Bridge](https://r.esri.com). Powered by the [ArcGIS Routing REST API](https://developers.arcgis.com/rest/routing/).

home:
  title: ArcGIS Routing for R
  description: >
    Solve routing, service area, vehicle routing, and origin-destination
    problems with the ArcGIS Routing REST API from R.
  links:
    - text: ArcGIS Routing REST API
      href: https://developers.arcgis.com/rest/routing/
    - text: R-ArcGIS Bridge
      href: https://r.esri.com

reference:
  - title: Routing
    desc: >
      Find the best route between an ordered or optimized set of stops and
      generate turn-by-turn directions.
    contents:
      - find_routes
      - find_routes_job

  - title: Service areas
    desc: >
      Generate polygons and lines describing the area reachable from a set of
      facilities within a given travel time or distance.
    contents:
      - find_service_areas
      - solve_service_areas_job
      - download_service_area_results

  - title: Closest facility
    desc: >
      Find one or more nearby facilities from a set of incidents based on travel
      time or distance.
    contents:
      - find_closest_facility
      - find_closest_facilities_job

  - title: Origin-destination cost matrix
    desc: >
      Measure the travel time or distance between every origin and every
      destination in a pair of point sets.
    contents:
      - travel_cost_matrix
      - od_cost_matrix_job
      - download_od_results

  - title: Vehicle routing & last mile delivery
    desc: >
      Plan efficient routes for a fleet of vehicles servicing a set of orders,
      including clustered last mile delivery problems.
    contents:
      - route_vehicles
      - solve_vrp_job
      - last_mile_delivery

  - title: Location-allocation
    desc: >
      Choose the set of facilities that best serves demand from surrounding
      areas.
    contents:
      - location_allocation_job

  - title: Snap to roads
    desc: >
      Snap a sequence of GPS points to the most likely roads traveled.
    contents:
      - snap_to_roads

  - title: Travel modes
    desc: >
      Discover the modes of transportation available to your organization.
    contents:
      - get_travel_modes
      - retrieve_travel_modes

  - title: Geometry helpers
    desc: >
      Utilities for working with the geometries returned by the routing
      services.
    contents:
      - decode_compressed_geometry
